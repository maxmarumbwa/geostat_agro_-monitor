<!DOCTYPE html>
<html>
<head>
    <title>NDVI Dashboard - Zimbabwe</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* ---------------- LAYOUT ---------------- */
        .container {
            display: flex;
            height: 100vh;
        }

        /* ---------------- SIDEBAR ---------------- */
        .sidebar {
            width: 330px;
            background: #f4f4f4;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            margin-top: 0;
        }

        .sidebar button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
            background: #ddd;
            border-radius: 5px;
        }

        .sidebar button:hover {
            background: #bbb;
        }

        /* ---------------- MAP ---------------- */
        #map {
            flex: 1;
        }

        input, button {
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>🌿 NDVI Layers</h3>

        <label>Date:</label>
        <input type="date" id="date" value="2024-01-01">

        <button onclick="loadNDVILayers()">Load Data</button>

        <hr>

        <h4>Toggle Layers</h4>

        <button onclick="showLayer('NDVI')">NDVI</button>
        <button onclick="showLayer('Baseline')">Baseline</button>
        <button onclick="showLayer('Min NDVI')">Min NDVI</button>
        <button onclick="showLayer('Max NDVI')">Max NDVI</button>
        <button onclick="showLayer('Anomaly')">Anomaly</button>

        <p id="status"></p>
    </div>

    <!-- MAP -->
    <div id="map"></div>

</div>

<script>

let map;
let layers = {};
let activeLayer = null;

const zimBounds = [
    [-22.5, 25],
    [-15, 34]
];

// ---------------- INIT MAP ----------------
function initMap() {

    map = L.map('map', {
        maxBounds: zimBounds,
        maxBoundsViscosity: 1.0
    }).fitBounds(zimBounds);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        noWrap: true
    }).addTo(map);
}

// ---------------- LOAD LAYERS ----------------
function loadNDVILayers() {

    const date = document.getElementById("date").value;

    document.getElementById("status").innerText = "Loading layers...";

    fetch(`/get_ndvi_layers/?date=${date}`)
        .then(res => res.json())
        .then(data => {

            if (data.error) throw new Error(data.error);

            // Remove old layers
            Object.values(layers).forEach(l => {
                if (map.hasLayer(l)) map.removeLayer(l);
            });

            // Create layers
            layers = {
                "NDVI": L.tileLayer(data.ndvi, { opacity: 0.7, bounds: zimBounds }),
                "Baseline": L.tileLayer(data.baseline, { opacity: 0.7, bounds: zimBounds }),
                "Min NDVI": L.tileLayer(data.min, { opacity: 0.7, bounds: zimBounds }),
                "Max NDVI": L.tileLayer(data.max, { opacity: 0.7, bounds: zimBounds }),
                "Anomaly": L.tileLayer(data.anomaly, { opacity: 0.7, bounds: zimBounds })
            };

            // Default layer
            showLayer("NDVI");

            document.getElementById("status").innerText = "Layers loaded";

        })
        .catch(err => {
            console.error(err);
            alert(err.message);
        });
}

// ---------------- SHOW SELECTED LAYER ----------------
function showLayer(name) {

    if (!layers[name]) {
        alert("Load data first!");
        return;
    }

    // Remove current
    if (activeLayer) {
        map.removeLayer(activeLayer);
    }

    // Add new
    activeLayer = layers[name];
    activeLayer.addTo(map);

    document.getElementById("status").innerText = "Showing: " + name;
}

// INIT
window.onload = initMap;

</script>

</body>
</html>
