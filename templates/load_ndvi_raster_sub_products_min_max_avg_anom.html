<!DOCTYPE html>
<html>

<head>
    <title>NDVI Anomaly Dashboard - Zimbabwe</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .controls {
            margin-bottom: 10px;
        }

        button {
            padding: 8px 12px;
            margin-right: 10px;
            cursor: pointer;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        #map {
            flex: 1;
            height: 450px;
        }

        #chart-container {
            flex: 1;
        }

        canvas {
            width: 100%;
            height: 450px;
        }
    </style>
</head>

<body>

    <h2>🌿 NDVI Anomaly Dashboard</h2>

    <div class="controls">
        <label>Start:</label>
        <input type="date" id="start_date" value="2024-01-01">
        <label>End:</label>
        <input type="date" id="end_date" value="2024-03-01">
        <button onclick="enableClick()">🖱 Enable Click</button>
        <button onclick="disableClick()">🚫 Disable Click</button>
        <label>Date:</label>
        <input type="date" id="date" value="2024-01-01">
        <button onclick="loadNDVILayers()">Load Layers</button>
    </div>

    <p id="status"></p>

    <div class="container">
        <div id="map"></div>
        <div id="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <script>
        let map, marker = null, chart = null;
        let clickEnabled = false;
        const zimBounds = [[-22.5, 25], [-15, 34]];

        // ---------------- INIT MAP ----------------
        function initMap() {
            map = L.map('map', { maxBounds: zimBounds, maxBoundsViscosity: 1.0 }).fitBounds(zimBounds);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { noWrap: true }).addTo(map);

            map.on('click', function (e) {
                if (!clickEnabled) return;

                const lat = e.latlng.lat;
                const lon = e.latlng.lng;

                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map);

                loadAnomalyTimeSeries(lat, lon);
            });
        }

        // ---------------- ENABLE / DISABLE ----------------
        function enableClick() { clickEnabled = true; document.getElementById("status").innerText = "Click enabled"; }
        function disableClick() { clickEnabled = false; document.getElementById("status").innerText = "Click disabled"; }

        // ---------------- LOAD NDVI ANOMALY ----------------
        let layers = {};

        function loadNDVILayers() {

            const date = document.getElementById("date").value;

            fetch(`/get_ndvi_layers/?date=${date}`)
                .then(res => res.json())
                .then(data => {

                    // Remove old layers
                    Object.values(layers).forEach(l => {
                        if (map.hasLayer(l)) map.removeLayer(l);
                    });

                    // Create layers
                    layers = {
                        ndvi: L.tileLayer(data.ndvi, { opacity: 0.7 }),
                        baseline: L.tileLayer(data.baseline, { opacity: 0.7 }),
                        min: L.tileLayer(data.min, { opacity: 0.7 }),
                        max: L.tileLayer(data.max, { opacity: 0.7 }),
                        anomaly: L.tileLayer(data.anomaly, { opacity: 0.7 })
                    };

                    // Add default layer
                    layers.ndvi.addTo(map);

                    // Layer control
                    L.control.layers(null, {
                        "NDVI": layers.ndvi,
                        "Baseline": layers.baseline,
                        "Min NDVI": layers.min,
                        "Max NDVI": layers.max,
                        "Anomaly": layers.anomaly
                    }).addTo(map);

                });
        }

        // ---------------- DRAW CHART ----------------
        function drawChart(labels, ndvi, baseline, anomaly, max, min) {
            const ctx = document.getElementById("chart").getContext("2d");

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'NDVI', data: ndvi, borderColor: 'green', fill: false, tension: 0.3 },
                        { label: 'Baseline NDVI', data: baseline, borderColor: 'blue', fill: false, tension: 0.3 },
                        { label: 'NDVI Anomaly', data: anomaly, borderColor: 'red', fill: false, tension: 0.3 },
                        { label: 'Max NDVI', data: max, borderColor: 'orange', fill: false, tension: 0.3 },
                        { label: 'Min NDVI', data: min, borderColor: 'purple', fill: false, tension: 0.3 },
                    ]
                },
                options: {
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { title: { display: true, text: "NDVI" } } }
                }
            });
        }

        // INIT
        window.onload = initMap;
    </script>

</body>

</html>
