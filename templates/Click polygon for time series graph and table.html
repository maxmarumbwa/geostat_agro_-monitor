<!DOCTYPE html>
<html>
<head>
    <title>Rainfall GIS Dashboard - Zimbabwe</title>

    <!-- Leaflet CSS/JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }
        input, button { padding: 6px; margin: 5px; }

        .top-row { display: flex; gap: 20px; margin-top: 20px; }
        #map { flex: 2; height: 500px; }
        .table-container { flex: 1; overflow-y: auto; max-height: 500px; }

        .chart-container { margin-top: 30px; }
        canvas { width: 100% !important; height: 400px !important; }

        table { border-collapse: collapse; width: 80%; }
        table, th, td { border: 1px solid #333; }
        th, td { padding: 6px; text-align: center; }

        @media (max-width: 768px) { .top-row { flex-direction: column; } }
    </style>
</head>
<body>

<h2>🌧️ Rainfall GIS Dashboard - Zimbabwe</h2>

<label>Start Date:</label>
<input type="date" id="start_date" value="2023-12-20">
<label>End Date:</label>
<input type="date" id="end_date" value="2024-02-10">

<div class="top-row">
    <div id="map"></div>
    <div class="table-container">
        <h3>📊 Rainfall Table</h3>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Rainfall (mm)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="chart-container">
    <h3>📈 Rainfall Time Series</h3>
    <canvas id="rainChart"></canvas>
</div>

<script>
let map, chart, selectedDistrictLayer;
let selectedDistrict = null; // Currently selected district

// ------------------
// Initialize Map
// ------------------
function initMap() {
    map = L.map('map').setView([-19, 29], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Load GeoJSON districts
    fetch('/static/geojson/zimadm1.geojson')
        .then(res => res.json())
        .then(geojson => {
            L.geoJSON(geojson, {
                style: { color: '#555', weight: 1, fillOpacity: 0.3 },
                onEachFeature: function(feature, layer) {
                    layer.on({
                        click: function(e) {
                            if (selectedDistrictLayer) {
                                selectedDistrictLayer.setStyle({ fillOpacity: 0.3, color: '#555' });
                            }

                            selectedDistrictLayer = e.target;
                            selectedDistrictLayer.setStyle({ fillOpacity: 0.7, color: '#ff0000' });

                            // Use ADM1_EN or fallback property
                            selectedDistrict = feature.properties.ADM1_EN || feature.properties[""];

                            console.log("Selected district:", selectedDistrict);

                            loadData();
                        }
                    });

                    // Tooltip
                    const name = feature.properties.ADM1_EN || feature.properties[""];
                    layer.bindTooltip(name, { sticky: true });
                }
            }).addTo(map);
        })
        .catch(err => console.error("GeoJSON load error:", err));
}

// ------------------
// Load Rainfall Data
// ------------------
function loadData() {
    if (!selectedDistrict) {
        alert("Click a district on the map first!");
        return;
    }

    const start_date = document.getElementById("start_date").value;
    const end_date = document.getElementById("end_date").value;

    const url = `/get_rainfall_value_series_district/?district=${encodeURIComponent(selectedDistrict)}&start_date=${start_date}&end_date=${end_date}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            if (data.status !== "success") {
                alert("API returned error");
                return;
            }

            // Fill table
            const tbody = document.querySelector("#resultsTable tbody");
            tbody.innerHTML = "";
            const dates = [], rainfall = [];

            data.data.forEach(item => {
                tbody.innerHTML += `<tr><td>${item.date}</td><td>${item.rainfall}</td></tr>`;
                dates.push(item.date);
                rainfall.push(item.rainfall);
            });

            drawChart(dates, rainfall);
        })
        .catch(err => {
            console.error(err);
            alert("Failed to load data from API");
        });
}

// ------------------
// Draw Chart.js
// ------------------
function drawChart(labels, values) {
    const ctx = document.getElementById('rainChart').getContext('2d');
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Rainfall (mm)',
                data: values,
                borderWidth: 2,
                borderColor: '#1f78b4',
                backgroundColor: 'rgba(31,120,180,0.2)',
                tension: 0.3,
                fill: true,
                pointRadius: 2
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
}

window.onload = initMap;
</script>

</body>
</html>
