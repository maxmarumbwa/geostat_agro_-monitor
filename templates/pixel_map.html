<!DOCTYPE html>
<html>
<head>
    <title>🌧️ CHIRPS Pixel Rainfall</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 600px; }
        body { font-family: Arial; margin: 20px; }
    </style>
</head>

<body>

<h2>🌧️ CHIRPS Rainfall (Click Map)</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="get">
    Start Date:
    <input type="date" name="start_date" value="{{ start_date }}">

    End Date:
    <input type="date" name="end_date" value="{{ end_date }}">

    <button type="submit">Update</button>
</form>

<br>

<div id="map"></div>

<script>
    var map = L.map('map').setView([-19, 29], 6);

    // Base map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // CHIRPS layer
    var rainfallLayer = L.tileLayer("{{ tile_url }}", {
        opacity: 0.7
    }).addTo(map);

    // Click event
    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lon = e.latlng.lng;

        // Call Django endpoint
        fetch(`/get-pixel-rainfall?lat=${lat}&lon=${lon}&start_date={{ start_date }}&end_date={{ end_date }}`)
        .then(res => res.json())
        .then(data => {

            var value = data.rainfall;

            L.popup()
                .setLatLng(e.latlng)
                .setContent(`🌧️ Rainfall: <b>${value} mm</b>`)
                .openOn(map);
        });
    });

</script>

</body>
</html>
