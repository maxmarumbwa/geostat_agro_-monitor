<!DOCTYPE html>
<html>

<head>
    <title>CHIRPS Rainfall - Zimbabwe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: Arial; }
        #map { width: 100%; height: 600px; }
    </style>
</head>

<body>

<h1>🌧️ CHIRPS Cumulative Rainfall - Zimbabwe</h1>

<h3>Select Date Range</h3>

<form method="GET" style="margin-bottom: 15px;">
    <label>Start Date:</label>
    <input type="date" name="start_date" value="{{ start_date }}" required>

    <label>End Date:</label>
    <input type="date" name="end_date" value="{{ end_date }}" required>

    <button type="submit">Show Rainfall</button>
</form>

{% if error %}
    <p style="color:red">{{ error }}</p>
{% endif %}

<div id="map"></div>

<script>
    var map = L.map('map').setView([{{ center_lat }}, {{ center_lng }}], 6);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

    {% if not error %}
    L.tileLayer('{{ tile_url|safe }}', {
        opacity: 0.8
    }).addTo(map);
    {% endif %}

    var geojsonData = {{ geojson_data|safe }};
    var rainfallStats = {{ district_rainfall|safe }};

    // Color scale
    function getColor(value) {
        return value > 250 ? '#253494' :
               value > 150 ? '#2c7fb8' :
               value > 80  ? '#41b6c4' :
               value > 40  ? '#a1dab4' :
                             '#ffffcc';
    }

    // Style districts
    function style(feature) {
        var name = feature.properties.ADM1_EN || "Unknown";
        var value = rainfallStats[name] || 0;

        return {
            fillColor: getColor(value),
            weight: 1,
            color: '#333',
            fillOpacity: 0.7
        };
    }

    // Popup
    function onEachFeature(feature, layer) {
        var name = feature.properties.ADM1_EN || "Unknown";
        var rainfall = rainfallStats[name] || 0;

        layer.bindPopup(
            '<b>' + name + '</b><br>' +
            '🌧️ Rainfall: <b>' + rainfall + ' mm</b><br>' +
            '📅 {{ start_date }} to {{ end_date }}'
        );
    }

    L.geoJSON(geojsonData, {
        style: style,
        onEachFeature: onEachFeature
    }).addTo(map);

    map.fitBounds([
        [{{ bounds_sw_lat }}, {{ bounds_sw_lng }}],
        [{{ bounds_ne_lat }}, {{ bounds_ne_lng }}]
    ]);

</script>

</body>
</html>
