<!DOCTYPE html>
<html>
<head>
    <title>Leaflet Earth Engine Tile</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([-20, 30], 7);

        // Tile layer using the Earth Engine URL template
        var earthEngineTile = L.tileLayer("https://earthengine.googleapis.com/v1/projects/earthengine-legacy/maps/62f01f20990f427f8abefde83df7bde1-3668098777dd7abf922de53940b39f7b/tiles/{z}/{x}/{y}", {
            attribution: '© Google Earth Engine',
            maxZoom: 18,
            }).addTo(map);
    </script>
</body>
</html>
