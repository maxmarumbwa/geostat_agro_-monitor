<!DOCTYPE html>
<html>
<head>
    <title>NDVI Dashboard - Zimbabwe</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI'; background: #1e2a2e; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 380px; background: #f4f6f8; padding: 1rem; overflow-y: auto; }
        #map { flex: 1; }

        button { background: #2c7a47; color: white; border: none; padding: 6px 12px; border-radius: 20px; margin-top:5px; }

        .chart-container { margin-top: 10px; background: white; padding: 10px; border-radius: 10px; }
    </style>
</head>

<body>
<div class="container">

<div class="sidebar">

<h3>🌿 NDVI Dashboard</h3>

<label>Date:</label>
<input type="date" id="date" value="2024-01-01" style="width:100%;">
<button onclick="loadLayers()">Reload Map</button>

<hr>

<label>Start Date:</label>
<input type="date" id="start_date" value="2024-01-01" style="width:100%;">
<label>End Date:</label>
<input type="date" id="end_date" value="2024-06-01" style="width:100%;">

<hr>

<button onclick="setMode('pixel')">📍 Pixel</button>
<button onclick="setMode('polygon')">🗺 Province</button>

<div id="infoText">Click a province</div>

<hr>

<!-- REPORT SECTION -->
<h4>📄 Crop Report</h4>

<label>Report Title:</label>
<input type="text" id="reportTitle" value="Crop Monitoring Report" style="width:100%;">

<label>Region Name:</label>
<input type="text" id="reportRegion" placeholder="Auto or custom name" style="width:100%;">

<button onclick="generateReport()">📄 Generate Report</button>

<div class="chart-container">
    <canvas id="chart"></canvas>
</div>

</div>

<div id="map"></div>

</div>

<script>
let map, layers={}, activeLayer;
let chart, chartDataStore;
let mode="polygon";
let currentProvince=null;
let currentPoint=null;

const zimBounds = L.latLngBounds([-23.5,25.3],[-15.6,32]);

// INIT
map = L.map('map').setView([-19,29],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// LOAD LAYERS
function loadLayers(){
    const date = document.getElementById("date").value;

    fetch(`/get_ndvi_layers/?date=${date}`)
    .then(r=>r.json())
    .then(data=>{
        if(activeLayer) map.removeLayer(activeLayer);

        layers = {
            NDVI: L.tileLayer(data.ndvi),
            Baseline: L.tileLayer(data.baseline),
            Anomaly: L.tileLayer(data.anomaly)
        };

        activeLayer = layers.NDVI;
        activeLayer.addTo(map);
    });
}

// MODE
function setMode(m){
    mode = m;
    document.getElementById("infoText").innerText = (m==="pixel") ? "Click map" : "Click province";
}

// MAP CLICK
map.on('click', function(e){
    if(mode!=="pixel") return;

    currentPoint = e.latlng;

    fetch(`/get_ndvi_anomaly_timeseries/?lat=${e.latlng.lat}&lon=${e.latlng.lng}&start_date=${start_date.value}&end_date=${end_date.value}`)
    .then(r=>r.json())
    .then(data=> drawChart(data));
});

// LOAD GEOJSON
fetch('/static/geojson/zimadm2.geojson')
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        onEachFeature:(f,l)=>{
            l.on('click', ()=>{
                if(mode!=="polygon") return;
                currentProvince = f.properties.ADM2_EN;

                fetch('/get_ndvi_zonal_timeseries/',{
                    method:"POST",
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        geometry:f.geometry,
                        start_date:start_date.value,
                        end_date:end_date.value
                    })
                })
                .then(r=>r.json())
                .then(data=> drawChart(data));
            });
        }
    }).addTo(map);
});

// DRAW CHART
function drawChart(data){
    const labels = data.data.map(d=>d.date);
    const ndvi = data.data.map(d=>d.ndvi);
    const baseline = data.data.map(d=>d.baseline);
    const anomaly = data.data.map(d=>d.anomaly);

    chartDataStore = {labels,ndvi,baseline,anomaly};

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
            labels,
            datasets:[
                {label:'NDVI', data:ndvi, borderColor:'green'},
                {label:'Baseline', data:baseline, borderColor:'blue'},
                {label:'Anomaly', data:anomaly, borderColor:'red'}
            ]
        }
    });
}

// ================= REPORT GENERATOR =================
function generateReport(){

    if(!chartDataStore){
        alert("Load data first");
        return;
    }

    const title = document.getElementById("reportTitle").value;
    const region = document.getElementById("reportRegion").value || currentProvince || "Selected Area";

    const {labels, ndvi, anomaly} = chartDataStore;

    const avgNDVI = (ndvi.reduce((a,b)=>a+b,0)/ndvi.length).toFixed(3);
    const avgAnomaly = (anomaly.reduce((a,b)=>a+b,0)/anomaly.length).toFixed(3);

    const stress = anomaly.filter(v=>v<-0.1).length;
    const stressPct = ((stress/anomaly.length)*100).toFixed(1);

    let health="Normal";
    if(avgAnomaly<-0.1) health="Moderate Stress";
    if(avgAnomaly<-0.25) health="Severe Stress";

    const chartImg = chart.toBase64Image();

    const win = window.open("");

    win.document.write(`
    <html>
    <head>
    <style>
    body{font-family:Arial;margin:40px;}
    .page{page-break-after:always;}
    h1{color:#2c7a47;}
    .box{border:1px solid #ccc;padding:10px;margin:10px 0;}
    </style>
    </head>

    <body>

    <!-- PAGE 1 -->
    <div class="page">
    <h1>${title}</h1>

    <div class="box">
    <b>Region:</b> ${region}<br>
    <b>Date:</b> ${new Date().toLocaleDateString()}
    </div>

    <div class="box">
    <b>Avg NDVI:</b> ${avgNDVI}<br>
    <b>Avg Anomaly:</b> ${avgAnomaly}<br>
    <b>Status:</b> ${health}
    </div>
    </div>

    <!-- PAGE 2 -->
    <div class="page">
    <h2>NDVI Analysis</h2>
    <img src="${chartImg}" width="100%">
    </div>

    <!-- PAGE 3 -->
    <div class="page">
    <h2>Indicators</h2>

    <div class="box">
    Stress Periods: ${stressPct}%
    </div>

    <div class="box">
    Recommendation: Monitor rainfall & irrigation.
    </div>

    </div>

    </body>
    </html>
    `);
}
</script>

</body>
</html>
