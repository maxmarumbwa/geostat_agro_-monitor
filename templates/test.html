<!DOCTYPE html>
<html>
<head>
    <title>Rainfall Time Series</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 800px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .rainfall-positive {
            font-weight: bold;
            color: #0066cc;
            background-color: #e6f2ff;
        }
        .rainfall-zero {
            color: #999;
        }
        .stats {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>

<h2>🌧️ Rainfall Time Series</h2>

<label>Latitude:</label>
<input type="number" id="lat" value="-20" step="any"><br><br>

<label>Longitude:</label>
<input type="number" id="lon" value="30" step="any"><br><br>

<label>Start Date:</label>
<input type="date" id="start_date" value="2023-12-20"><br><br>

<label>End Date:</label>
<input type="date" id="end_date" value="2024-02-10"><br><br>

<button onclick="loadData()">Load Rainfall Data</button>

<h3>Results:</h3>
<div id="errorMessage" style="color: red; margin: 10px 0;"></div>
<div id="stats" class="stats"></div>
<div id="apiInfo" style="margin: 10px 0; font-size: 0.9em; color: #666;"></div>

<table border="1" id="resultsTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Rainfall (mm)</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
function loadData() {
    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;
    const start_date = document.getElementById("start_date").value;
    const end_date = document.getElementById("end_date").value;

    // Clear previous results
    document.getElementById("errorMessage").innerHTML = "";
    document.getElementById("stats").innerHTML = "";
    document.getElementById("apiInfo").innerHTML = "";
    const tableBody = document.querySelector("#resultsTable tbody");
    tableBody.innerHTML = "<tr><td colspan='2'>Loading...</td></tr>";

    const url = `http://127.0.0.1:8000/get_rainfall_value_series_all/?lat=${lat}&lon=${lon}&start_date=${start_date}&end_date=${end_date}`;
    
    console.log("Fetching URL:", url);

    fetch(url)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(response => {
            console.log("API Response:", response);
            
            // Check if response has status and data
            if (response.status === "success" && response.data && Array.isArray(response.data)) {
                const rainfallData = response.data;
                const count = response.count;
                
                console.log(`Successfully loaded ${rainfallData.length} records`);
                
                // Display API info
                document.getElementById("apiInfo").innerHTML = `
                    <span class="success">✓ API Status: ${response.status}</span> | 
                    Location: ${response.lat}, ${response.lon} | 
                    Date Range: ${response.start_date} to ${response.end_date} | 
                    Total Records: ${response.count}
                `;
                
                // Clear loading message
                tableBody.innerHTML = "";
                
                // Track statistics
                let totalRainfall = 0;
                let rainyDays = 0;
                let maxRainfall = 0;
                let maxRainfallDate = "";
                
                // Display each record
                rainfallData.forEach(item => {
                    const date = item.date;
                    const rainfall = item.rainfall;
                    
                    // Format the rainfall value
                    let displayValue = "";
                    let rowClass = "";
                    
                    if (rainfall === 0) {
                        displayValue = "0.00";
                        rowClass = "rainfall-zero";
                    } else if (rainfall > 0) {
                        displayValue = rainfall.toFixed(2);
                        rowClass = "rainfall-positive";
                        totalRainfall += rainfall;
                        rainyDays++;
                        
                        if (rainfall > maxRainfall) {
                            maxRainfall = rainfall;
                            maxRainfallDate = date;
                        }
                    } else {
                        displayValue = rainfall.toString();
                    }
                    
                    const row = `
                        <tr class="${rowClass}">
                            <td>${date}</td>
                            <td>${displayValue}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
                
                // Calculate statistics
                const avgRainfall = rainyDays > 0 ? (totalRainfall / rainyDays).toFixed(2) : 0;
                const totalDays = rainfallData.length;
                const dryDays = totalDays - rainyDays;
                const coveragePercent = ((rainyDays / totalDays) * 100).toFixed(1);
                
                const statsHtml = `
                    <strong>📊 Rainfall Statistics (${response.start_date} to ${response.end_date}):</strong><br><br>
                    <strong>📍 Location:</strong> ${response.lat}°, ${response.lon}°<br>
                    <strong>📅 Total Days:</strong> ${totalDays}<br>
                    <strong>☔ Rainy Days:</strong> ${rainyDays} (${coveragePercent}% of days)<br>
                    <strong>☀️ Dry Days (0mm):</strong> ${dryDays}<br>
                    <strong>💧 Total Rainfall:</strong> ${totalRainfall.toFixed(2)} mm<br>
                    <strong>📊 Average Rainfall (rainy days only):</strong> ${avgRainfall} mm<br>
                    <strong>🏆 Maximum Daily Rainfall:</strong> ${maxRainfall.toFixed(2)} mm on ${maxRainfallDate}<br>
                    <strong>📈 Average Daily Rainfall (all days):</strong> ${(totalRainfall / totalDays).toFixed(2)} mm
                `;
                document.getElementById("stats").innerHTML = statsHtml;
                
            } else {
                // Handle unexpected response format
                console.error("Unexpected API response format:", response);
                document.getElementById("errorMessage").innerHTML = "API returned unexpected format. Check console for details.";
                tableBody.innerHTML = "<tr><td colspan='2'>Error: Invalid data format from API</td></tr>";
            }
        })
        .catch(error => {
            console.error("Error details:", error);
            document.getElementById("errorMessage").innerHTML = `Failed to load data: ${error.message}<br>
                Make sure the API server is running at http://127.0.0.1:8000`;
            const tableBody = document.querySelector("#resultsTable tbody");
            tableBody.innerHTML = "<tr><td colspan='2'>Error loading data</td></tr>";
        });
}
</script>

</body>
</html>
