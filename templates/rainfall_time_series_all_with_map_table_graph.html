<!DOCTYPE html>
<html>
<head>
    <title>Rainfall GIS Dashboard</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input, button {
            padding: 6px;
            margin: 5px;
        }

        /* 🔥 TOP ROW (MAP + TABLE) */
        .top-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        #map {
            flex: 2;
            height: 400px;
        }

        .table-container {
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
        }

        /* 🔥 BOTTOM CHART */
        .chart-container {
            margin-top: 30px;
        }

        canvas {
            width: 100% !important;
            height: 400px !important;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        table, th, td {
            border: 1px solid #333;
        }

        th, td {
            padding: 6px;
            text-align: center;
        }

        /* 📱 Mobile */
        @media (max-width: 768px) {
            .top-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<h2>🌧️ Rainfall GIS Dashboard</h2>

<label>Latitude:</label>
<input type="number" id="lat" value="-20">

<label>Longitude:</label>
<input type="number" id="lon" value="30">

<label>Start Date:</label>
<input type="date" id="start_date" value="2023-12-20">

<label>End Date:</label>
<input type="date" id="end_date" value="2024-02-10">

<button onclick="loadData()">Load Data</button>

<!-- 🔥 TOP: MAP + TABLE -->
<div class="top-row">

    <!-- MAP -->
    <div id="map"></div>

    <!-- TABLE -->
    <div class="table-container">
        <h3>📊 Table</h3>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Rainfall (mm)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<!-- 🔥 BOTTOM: CHART -->
<div class="chart-container">
    <h3>📈 Rainfall Time Series</h3>
    <canvas id="rainChart"></canvas>
</div>

<script>
let map, marker, chart;

// 🗺️ Init map
function initMap() {
    map = L.map('map').setView([-19, 29], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    map.on('click', function(e) {
        const lat = e.latlng.lat.toFixed(4);
        const lon = e.latlng.lng.toFixed(4);

        document.getElementById("lat").value = lat;
        document.getElementById("lon").value = lon;

        if (marker) {
            marker.setLatLng(e.latlng);
        } else {
            marker = L.marker(e.latlng).addTo(map);
        }

        loadData(); // 🔥 auto-load
    });
}

// 📡 Fetch data
function loadData() {
    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;
    const start_date = document.getElementById("start_date").value;
    const end_date = document.getElementById("end_date").value;

    const url = `/get_rainfall_value_series_all/?lat=${lat}&lon=${lon}&start_date=${start_date}&end_date=${end_date}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            if (data.status !== "success") {
                alert("API error");
                return;
            }

            const tbody = document.querySelector("#resultsTable tbody");
            tbody.innerHTML = "";

            const dates = [];
            const rainfall = [];

            data.data.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.date}</td>
                        <td>${item.rainfall}</td>
                    </tr>
                `;

                dates.push(item.date);
                rainfall.push(item.rainfall);
            });

            drawChart(dates, rainfall);
        })
        .catch(err => {
            console.error(err);
            alert("Failed to load data");
        });
}

// 📈 Chart
function drawChart(labels, values) {
    const ctx = document.getElementById('rainChart').getContext('2d');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Rainfall (mm)',
                data: values,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

// 🚀 Start
window.onload = initMap;
</script>

</body>
</html>
