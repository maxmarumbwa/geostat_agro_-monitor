<!DOCTYPE html>
<html>
<head>
    <title>AgriEO Analytics</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f6f8;
        }

        h2 {
            color: #2c3e50;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        pre {
            margin-top: 20px;
            background: #1e1e1e;
            color: #00ff9c;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

<h2>🌍 AgriEO Point Analysis</h2>

<form id="form">
    {% csrf_token %}

    <label>Latitude:</label>
    <input type="text" id="lat" placeholder="-17.8292">

    <label>Longitude:</label>
    <input type="text" id="lon" placeholder="31.0522">

    <button type="submit">Analyze</button>
</form>

<pre id="result">Results will appear here...</pre>

<script>
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

document.getElementById('form').onsubmit = async (e) => {
    e.preventDefault();

    const lat = parseFloat(document.getElementById('lat').value);
    const lon = parseFloat(document.getElementById('lon').value);

    if (isNaN(lat) || isNaN(lon)) {
        alert("Please enter valid numeric coordinates.");
        return;
    }

    document.getElementById('result').innerText = "Processing...";

    try {
        const res = await fetch('/analyze/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            },
            body: JSON.stringify({
                latitude: lat,
                longitude: lon
            })
        });

        const data = await res.json();

        document.getElementById('result').innerText =
            JSON.stringify(data, null, 2);

    } catch (error) {
        document.getElementById('result').innerText =
            "Error: " + error;
    }
};
</script>

</body>
</html>
