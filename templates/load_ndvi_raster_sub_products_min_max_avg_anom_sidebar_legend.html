<!DOCTYPE html>
<html>
<head>
    <title>NDVI Dashboard - Zimbabwe</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 330px;
            background: #f4f4f4;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 5px;
        }

        .sidebar button:hover {
            background: #bbb;
        }

        #map {
            flex: 1;
        }

        /* LEGEND */
        .legend {
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .color-box {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }

        /* SLIDER */
        .slider-container {
            margin-top: 15px;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h3>🌿 NDVI Dashboard</h3>

        <label>Date:</label>
        <input type="date" id="date" value="2024-01-01">

        <button onclick="loadNDVILayers()">Load Data</button>

        <hr>

        <h4>Layers</h4>
        <button onclick="showLayer('NDVI')">NDVI</button>
        <button onclick="showLayer('Baseline')">Baseline</button>
        <button onclick="showLayer('Min NDVI')">Min NDVI</button>
        <button onclick="showLayer('Max NDVI')">Max NDVI</button>
        <button onclick="showLayer('Anomaly')">Anomaly</button>

        <!-- OPACITY -->
        <div class="slider-container">
            <label>Opacity:</label>
            <input type="range" min="0" max="1" step="0.1" value="0.7" oninput="changeOpacity(this.value)">
        </div>

        <!-- LEGEND -->
        <div class="legend" id="legend">
            <h4>Legend</h4>
            <div id="legendContent"></div>
        </div>

        <p id="status"></p>

    </div>

    <!-- MAP -->
    <div id="map"></div>

</div>

<script>

let map;
let layers = {};
let activeLayer = null;

const zimBounds = [[-22.5, 25], [-15, 34]];

// ---------------- INIT MAP ----------------
function initMap() {
    map = L.map('map', {
        maxBounds: zimBounds,
        maxBoundsViscosity: 1.0
    }).fitBounds(zimBounds);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        noWrap: true
    }).addTo(map);
}

// ---------------- LOAD LAYERS ----------------
function loadNDVILayers() {

    const date = document.getElementById("date").value;

    document.getElementById("status").innerText = "Loading layers...";

    fetch(`/get_ndvi_layers/?date=${date}`)
        .then(res => res.json())
        .then(data => {

            if (data.error) throw new Error(data.error);

            Object.values(layers).forEach(l => {
                if (map.hasLayer(l)) map.removeLayer(l);
            });

            layers = {
                "NDVI": L.tileLayer(data.ndvi, { opacity: 0.7, bounds: zimBounds }),
                "Baseline": L.tileLayer(data.baseline, { opacity: 0.7, bounds: zimBounds }),
                "Min NDVI": L.tileLayer(data.min, { opacity: 0.7, bounds: zimBounds }),
                "Max NDVI": L.tileLayer(data.max, { opacity: 0.7, bounds: zimBounds }),
                "Anomaly": L.tileLayer(data.anomaly, { opacity: 0.7, bounds: zimBounds })
            };

            showLayer("NDVI");

            document.getElementById("status").innerText = "Layers loaded";
        });
}

// ---------------- SHOW LAYER ----------------
function showLayer(name) {

    if (!layers[name]) {
        alert("Load data first!");
        return;
    }

    if (activeLayer) map.removeLayer(activeLayer);

    activeLayer = layers[name];
    activeLayer.addTo(map);

    updateLegend(name);

    document.getElementById("status").innerText = "Showing: " + name;
}

// ---------------- OPACITY ----------------
function changeOpacity(value) {
    if (activeLayer) {
        activeLayer.setOpacity(value);
    }
}

// ---------------- LEGEND ----------------
function updateLegend(layerName) {

    let content = "";

    if (layerName === "NDVI" || layerName === "Baseline" || layerName.includes("NDVI")) {
        content = `
            <div class="legend-item"><div class="color-box" style="background:white"></div>0</div>
            <div class="legend-item"><div class="color-box" style="background:green"></div>1</div>
        `;
    }

    if (layerName === "Anomaly") {
        content = `
            <div class="legend-item"><div class="color-box" style="background:red"></div>Negative</div>
            <div class="legend-item"><div class="color-box" style="background:white"></div>Normal</div>
            <div class="legend-item"><div class="color-box" style="background:green"></div>Positive</div>
        `;
    }

    document.getElementById("legendContent").innerHTML = content;
}

// INIT
window.onload = initMap;

</script>

</body>
</html>
