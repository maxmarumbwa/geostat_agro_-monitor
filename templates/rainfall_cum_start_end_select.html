<!DOCTYPE html>
<html>
<head>
    <title>CHIRPS Rainfall - Zimbabwe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<h1>🌧️ CHIRPS Daily Rainfall - Zimbabwe ({{ start_date }} to {{ end_date }})</h1>

<h2>Select date range to accumulate rainfall</h2>

<form method="GET" style="margin-bottom: 15px;">
    <label>Start Date:</label>
    <input type="date" name="start_date" id="start_date" value="{{ start_date }}" required>

    <label>End Date:</label>
    <input type="date" name="end_date" id="end_date" value="{{ end_date }}" required>

    <button type="submit">Show Rainfall</button>
</form>

<!-- QUERY BUTTON -->
<button id="queryBtn" onclick="activateQuery()">🖱️ Query Rainfall</button>

<div id="map" style="width: 100%; height: 600px;"></div>

<script>
    var map = L.map('map').setView([{{ center_lat }}, {{ center_lng }}], 6);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
        attribution: '© CartoDB'
    }).addTo(map);

    {% if error %}
        document.write('<p style="color:red">Error: {{ error }}</p>');
    {% else %}
        L.tileLayer('{{ tile_url|safe }}', {
            attribution: '© CHIRPS | Google Earth Engine',
            opacity: 0.8,
            maxZoom: 10
        }).addTo(map);
    {% endif %}

    // Zimbabwe boundary
    var geojsonData = {{ geojson_data|safe }};

    L.geoJSON(geojsonData, {
        style: {
            color: '#ff4444',
            weight: 2,
            fill: false,
            opacity: 0.8,
            dashArray: '3'
        }
    }).addTo(map);

    map.fitBounds([[{{ bounds_sw_lat }}, {{ bounds_sw_lng }}], [{{ bounds_ne_lat }}, {{ bounds_ne_lng }}]]);

    // =========================
    // QUERY FUNCTIONALITY
    // =========================
    let queryMode = false;
    let clickMarker = null;

    function activateQuery() {
        queryMode = !queryMode;
        const btn = document.getElementById("queryBtn");

        if (queryMode) {
            btn.innerHTML = "✅ Click map";
            map.getContainer().style.cursor = "crosshair";
        } else {
            btn.innerHTML = "🖱️ Query Rainfall";
            map.getContainer().style.cursor = "";
        }
    }

    map.on('click', function (e) {
        if (!queryMode) return;

        const lat = e.latlng.lat;
        const lon = e.latlng.lng;

        const startDate = document.getElementById("start_date").value;
        const endDate = document.getElementById("end_date").value;

        if (!startDate || !endDate) {
            alert("Please select both start and end dates");
            return;
        }

        // Remove old marker
        if (clickMarker) {
            map.removeLayer(clickMarker);
        }

        // Add loading marker
        clickMarker = L.marker([lat, lon]).addTo(map)
            .bindPopup("⏳ Loading rainfall data...")
            .openPopup();

        const url = `/get_rainfall_value_series/?lat=${lat}&lon=${lon}&start_date=${startDate}&end_date=${endDate}`;
        fetch(url)
            .then(response => response.json())
            .then(data => {
                console.log("API response:", data);

                if (data.error) {
                    clickMarker.setPopupContent("❌ " + data.error);
                    return;
                }

                let val = data.rainfall !== null
                    ? data.rainfall.toFixed(2) + " mm"
                    : "No data";

                let dateRange = `${data.start_date} → ${data.end_date}`;

                clickMarker.setPopupContent(
                    `📍 <b>${lat.toFixed(3)}, ${lon.toFixed(3)}</b><br>
                     🌧️ Rainfall: <b>${val}</b><br>
                     📅 ${dateRange}`
                );
            })
            .catch(err => {
                console.error("Fetch error:", err);
                clickMarker.setPopupContent("❌ Failed to fetch data");
            });
    });

</script>

</body>
</html>
