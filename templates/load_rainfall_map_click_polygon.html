<!DOCTYPE html>
<html>
<head>
    <title>Rainfall GIS Dashboard - Zimbabwe</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }

        .stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .card {
            flex: 1;
            padding: 15px;
            background: #f2f2f2;
            border-radius: 8px;
            text-align: center;
        }

        .top-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        #map { flex: 2; height: 500px; }

        .table-container {
            flex: 1;
            max-height: 500px;
            overflow-y: auto;
        }

        table { border-collapse: collapse; width: 100%; }
        table, th, td { border: 1px solid #333; }
        th, td { padding: 6px; text-align: center; }

        .chart-container { margin-top: 30px; }

        @media (max-width: 768px) {
            .top-row, .stats { flex-direction: column; }
        }
    </style>
</head>
<body>

<h2>🌧️ Rainfall GIS Dashboard - Zimbabwe</h2>

<label>Start Date:</label>
<input type="date" id="start_date" value="2023-12-20">

<label>End Date:</label>
<input type="date" id="end_date" value="2024-02-10">

<button onclick="loadRainfallMap()">🌧️ Load Rainfall Map</button>

<!-- STATS -->
<div class="stats">
    <div class="card">Total<br><b id="totalRain">-</b> mm</div>
    <div class="card">Average<br><b id="avgRain">-</b> mm</div>
    <div class="card">Max<br><b id="maxRain">-</b> mm</div>
</div>

<!-- MAP + TABLE -->
<div class="top-row">
    <div id="map"></div>

    <div class="table-container">
        <h3>📊 Table</h3>
        <table id="resultsTable">
            <thead>
                <tr><th>Date</th><th>Rainfall</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- CHART -->
<div class="chart-container">
    <h3>📈 Time Series</h3>
    <canvas id="rainChart"></canvas>
</div>

<script>
let map, geojsonLayer, chart;
let selectedDistrict = null;
let rainfallLayer = null;

// ---------------- MAP ----------------
function initMap() {

    map = L.map('map').setView([-19, 29], 6);

    const base = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    base.addTo(map);

    fetch('/static/geojson/zimadm1.geojson')
        .then(res => res.json())
        .then(data => {

            geojsonLayer = L.geoJSON(data, {
                style: { color: '#555', weight: 1, fillOpacity: 0.3 },
                onEachFeature: function(feature, layer) {

                    const name =
                        feature.properties.ADM1_EN ||
                        feature.properties[""] ||
                        feature.properties.ADM1_PCODE;

                    layer.bindTooltip(name);

                    layer.on({
                        click: function(e) {

                            selectedDistrict = name;
                            console.log("Selected:", selectedDistrict);

                            loadData();
                        }
                    });
                }
            }).addTo(map);

            // Layer control
            L.control.layers(
                {"Base Map": base},
                {"Rainfall": rainfallLayer}
            ).addTo(map);
        });

    loadRainfallMap();
}

// ---------------- RAINFALL MAP ----------------
function loadRainfallMap() {

    const date = document.getElementById("start_date").value;

    fetch(`/get_rainfall_tile/?date=${date}`)
        .then(res => res.json())
        .then(data => {

            if (rainfallLayer) {
                map.removeLayer(rainfallLayer);
            }

            rainfallLayer = L.tileLayer(data.tile_url, {
                opacity: 0.6
            });

            rainfallLayer.addTo(map);
        })
        .catch(err => console.error(err));
}

// ---------------- LOAD DISTRICT DATA ----------------
function loadData() {

    if (!selectedDistrict) {
        alert("Click a district first!");
        return;
    }

    const start_date = document.getElementById("start_date").value;
    const end_date = document.getElementById("end_date").value;

    const url = `/get_rainfall_value_series_district/?district=${encodeURIComponent(selectedDistrict)}&start_date=${start_date}&end_date=${end_date}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {

            const tbody = document.querySelector("#resultsTable tbody");
            tbody.innerHTML = "";

            let dates = [], rainfall = [];

            data.data.forEach(item => {
                tbody.innerHTML += `<tr><td>${item.date}</td><td>${item.rainfall}</td></tr>`;
                dates.push(item.date);
                rainfall.push(item.rainfall);
            });

            updateStats(rainfall);
            drawChart(dates, rainfall);
        })
        .catch(err => console.error(err));
}

// ---------------- STATS ----------------
function updateStats(values) {

    if (values.length === 0) return;

    const total = values.reduce((a,b)=>a+b,0);
    const avg = total / values.length;
    const max = Math.max(...values);

    document.getElementById("totalRain").innerText = total.toFixed(1);
    document.getElementById("avgRain").innerText = avg.toFixed(1);
    document.getElementById("maxRain").innerText = max.toFixed(1);
}

// ---------------- CHART ----------------
function drawChart(labels, values) {

    const ctx = document.getElementById('rainChart').getContext('2d');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Rainfall (mm)',
                data: values,
                borderWidth: 2,
                tension: 0.3,
                fill: true
            }]
        }
    });
}

// INIT
window.onload = initMap;
</script>

</body>
</html>
