<!DOCTYPE html>
<html>
<head>
    <title>NDVI Viewer - Zimbabwe</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }
        #map { height: 500px; margin-top: 20px; }
        button { padding: 8px 12px; margin-left: 10px; }
    </style>
</head>
<body>

<h2>🌿 NDVI Viewer (Zimbabwe)</h2>

<label>Select Date:</label>
<input type="date" id="date" value="2024-01-01">

<button onclick="loadNDVI()">Load NDVI</button>

<p id="status"></p>

<div id="map"></div>

<script>

// ---------------- GLOBALS ----------------
let map;
let ndviLayer = null;
let geojsonLayer;

// Zimbabwe bounds
const zimBounds = [
    [-22.5, 25],
    [-15, 34]
];

// ---------------- INIT MAP ----------------
function initMap() {

    map = L.map('map', {
        maxBounds: zimBounds,
        maxBoundsViscosity: 1.0,
        minZoom: 6,
        maxZoom: 10
    }).fitBounds(zimBounds);

    // Base map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        noWrap: true
    }).addTo(map);

    // Load provinces
    loadDistricts();

    // ---------------- CLICK EVENT ----------------
    map.on('click', function(e) {

        const lat = e.latlng.lat;
        const lon = e.latlng.lng;

        const date = document.getElementById("date").value;

        document.getElementById("status").innerText = "Getting NDVI value...";

        fetch(`/get_ndvi_value/?lat=${lat}&lon=${lon}&date=${date}`)
            .then(res => res.json())
            .then(data => {

                if (data.error) {
                    throw new Error(data.error);
                }

                const ndvi = data.ndvi;

                // Popup
                L.popup()
                    .setLatLng([lat, lon])
                    .setContent(`
                        <b>NDVI Value</b><br>
                        ${ndvi !== null ? ndvi.toFixed(3) : "No data"}
                    `)
                    .openOn(map);

                document.getElementById("status").innerText =
                    "NDVI: " + (ndvi !== null ? ndvi.toFixed(3) : "No data");

            })
            .catch(err => {
                console.error(err);
                alert("Error: " + err.message);
            });

    });
}

// ---------------- LOAD GEOJSON ----------------
function loadDistricts() {

    fetch('/static/geojson/zimadm1.geojson')
        .then(res => res.json())
        .then(data => {

            geojsonLayer = L.geoJSON(data, {

                style: {
                    color: "#333",
                    weight: 1,
                    fillOpacity: 0.1
                },

                onEachFeature: function(feature, layer) {

                    const name =
                        feature.properties.ADM1_EN ||
                        feature.properties.ADM1_PCODE;

                    layer.bindTooltip(name);

                    layer.on('mouseover', function() {
                        layer.setStyle({
                            weight: 2,
                            fillOpacity: 0.3
                        });
                    });

                    layer.on('mouseout', function() {
                        geojsonLayer.resetStyle(layer);
                    });

                }

            }).addTo(map);

            map.fitBounds(geojsonLayer.getBounds());
        });
}

// ---------------- LOAD NDVI ----------------
function loadNDVI() {

    const date = document.getElementById("date").value;

    if (!date) {
        alert("Please select a date");
        return;
    }

    document.getElementById("status").innerText = "Loading NDVI...";

    fetch(`/get_ndvi_tile/?date=${date}`)
        .then(res => res.json())
        .then(data => {

            if (data.error) {
                throw new Error(data.error);
            }

            if (ndviLayer) {
                map.removeLayer(ndviLayer);
            }

            ndviLayer = L.tileLayer(data.tile_url, {
                opacity: 0.7,
                noWrap: true,
                bounds: zimBounds
            });

            ndviLayer.addTo(map);

            document.getElementById("status").innerText =
                "NDVI loaded for " + date;

        })
        .catch(err => {
            console.error(err);
            alert("Error: " + err.message);
        });
}

// INIT
window.onload = initMap;

</script>

</body>
</html>
